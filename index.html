<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, minimum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#000000">
<link rel="manifest" href="manifest.json?v=20">
<link rel="apple-touch-icon" href="icon.png?v=20">
<title>Instagram</title>
<script>if('serviceWorker' in navigator){navigator.serviceWorker.register('sw.js');}</script>
<style>
  *{margin:0;padding:0;box-sizing:border-box;-webkit-user-select:none;user-select:none;-webkit-touch-callout:none;}
  /* NORMAL-FLOW document (the working-reference pattern): min-height:100dvh, the page
     flows; we do NOT lock with position:fixed/height:100dvh/overflow:hidden (that was
     fighting iOS's safe-area placement and leaving the on-device bottom gap). */
  html{background:#0d1115;-webkit-text-size-adjust:100%;}
  body{background:#0d1115;min-height:100dvh;overflow-x:hidden;
       font-family:-apple-system,"SF Pro Text",sans-serif;touch-action:manipulation;}
  img,video{-webkit-user-drag:none;}
  #app{position:relative;min-height:100dvh;background:#0d1115;overflow-x:hidden;}
  #stage{position:relative;min-height:100dvh;background:#0d1115;}

  /* one screen visible at a time; the active screen flows (sets the document height) */
  .screen{display:none;width:100%;background:#0d1115;position:relative;}
  .screen.active{display:block;}
  .screen.animating{position:absolute;top:0;left:0;z-index:50;}  /* only during a transition */
  /* nav screens reserve the home-indicator zone (dark) below the nav, like the
     reference's env(safe-area-inset-bottom) padding -> nav clears the indicator */
  .screen.navpad{padding-bottom:env(safe-area-inset-bottom,0px);}

  .sheet{position:relative;width:100%;}
  .sheet > img{display:block;width:100%;height:auto;position:relative;z-index:1;}
  video.bg{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;background:#0d1115;z-index:0;}
  .hot{position:absolute;background:transparent;z-index:5;}
  /* passive build-version label (home only) so the live deploy is identifiable */
  #ver{position:absolute;top:calc(env(safe-area-inset-top,8px) + 6px);left:50%;transform:translateX(-50%);
       z-index:60;opacity:.5;pointer-events:none;color:#fff;font:600 12px/1 -apple-system,monospace;
       letter-spacing:.5px;text-shadow:0 1px 2px rgba(0,0,0,.6);}
  /* live profile stat numbers drawn from real harvested digit-images */
  #profileStats{position:absolute;inset:0;z-index:3;pointer-events:none;}
  #profileStats img{position:absolute;-webkit-user-drag:none;}

  /* insights: header + content stacked; the whole screen scrolls naturally */
  #insHeader{position:relative;width:100%;z-index:5;}
  #insHeader img{display:block;width:100%;}
  #insContent{width:100%;background:#0d1115;}
  #insContent img{display:block;width:100%;}
  #insLoading{position:fixed;inset:0;z-index:10;background:#0d1115;display:none;}
  #insLoading img{display:block;width:100%;}
</style>
</head>
<body>
<div id="app">
  <div id="stage">

    <!-- HOME -->
    <div class="screen navpad active" id="s-home">
      <div id="ver"></div>
      <div class="sheet">
        <video class="bg" autoplay muted loop playsinline>
          <source src="screens/promo_placeholder.mp4?v=20" type="video/mp4">
        </video>
        <img src="screens/home_chrome_c.png?v=20">
        <div class="hot" style="left:76%;top:89%;width:24%;height:10%" onclick="goProfile()"></div>
      </div>
    </div>

    <!-- PROFILE -->
    <div class="screen navpad" id="s-profile">
      <div class="sheet">
        <img src="screens/profile_c.png?v=20">
        <div class="hot" style="left:4%;top:40%;width:92%;height:8%" onclick="goDashboard()"></div>
      </div>
    </div>

    <!-- DASHBOARD -->
    <div class="screen" id="s-dashboard">
      <div class="sheet">
        <img id="dashImg" src="screens/dash_loaded_c.png?v=20">
        <div class="hot" style="left:5.6%;top:18%;width:94.4%;height:8%" onclick="goInsights()"></div>
      </div>
    </div>

    <!-- INSIGHTS -->
    <div class="screen" id="s-insights">
      <div id="insHeader">
        <img id="himg" src="insights_overview_header2.png?v=20">
        <div class="hot" style="left:0;top:65%;width:33.3%;height:35%" onclick="insTab('overview')"></div>
        <div class="hot" style="left:66.7%;top:65%;width:33.3%;height:35%" onclick="insTab('audience')"></div>
      </div>
      <div id="insContent"><img id="cimg" src="insights_overview_full.png?v=20"></div>
      <div id="insLoading"><img id="loadImg" src="screens/ins_spinner_c.png?v=20"></div>
    </div>

  </div>
</div>
<script>
  // ---- live profile stat numbers (posts/followers/following) ----
  // Values come from config.js (window.STATS); digits are the real harvested
  // glyph images in glyphs/, positioned from glyphmeta.js. Edit config.js +
  // refresh to change them - no rebuild, auto-centered over the labels.
  function renderStats(){
    const meta = window.GLYPH_META, cfg = window.STATS;
    const sheet = document.querySelector('#s-profile .sheet');
    const overlay = document.getElementById('profileStats');
    if (!meta || !cfg || !sheet || !overlay) return;
    const scale = sheet.clientWidth / meta.img_w;   // uniform: aspect preserved
    if (!scale) return;
    overlay.innerHTML = '';
    const cap = meta.capPx * scale;
    const baseline = meta.baselinePx * scale;
    const gap = meta.gapPx * scale;
    const capTop = baseline - cap;
    for (const key in meta.stats){
      const val = String((cfg[key] != null ? cfg[key] : ''));
      const items = [];
      let totalW = 0;
      for (const ch of val){
        const g = meta.glyphs[ch];
        if (!g) continue;
        const w = g.w * scale;
        items.push({ g, w, h: g.h * scale, top: g.top * scale });
        totalW += w;
      }
      if (items.length) totalW += gap * (items.length - 1);
      let x = meta.stats[key].cx * scale - totalW / 2;   // center on label
      for (const it of items){
        const im = document.createElement('img');
        im.src = 'glyphs/' + it.g.file + (window.ASSET_V || '');
        im.style.left = x + 'px';
        im.style.top = (capTop + it.top) + 'px';
        im.style.width = it.w + 'px';
        im.style.height = it.h + 'px';
        overlay.appendChild(im);
        x += it.w + gap;
      }
    }
  }
  window.renderStats = renderStats;
  addEventListener('load', renderStats);
  addEventListener('resize', renderStats);
  if (window.visualViewport) visualViewport.addEventListener('resize', renderStats);
  if (document.readyState !== 'loading') renderStats();

  // hard-disable zoom (iOS ignores user-scalable in some versions)
  document.addEventListener('gesturestart', e => e.preventDefault());
  document.addEventListener('gesturechange', e => e.preventDefault());
  let lastTouch = 0;
  document.addEventListener('touchend', e => {
    const now = Date.now();
    if (now - lastTouch <= 300) e.preventDefault();
    lastTouch = now;
  }, { passive: false });

  const ASSET_V = '?v=20';   // bump when any screen image changes (cache-bust mobile)
  const el = id => document.getElementById(id);
  { const v = el('ver'); if (v) v.textContent = 'BUILD ' + ASSET_V.replace('?v=', 'v'); }

  // Flow-model navigation: exactly one screen is .active (in normal flow, so it sets
  // the document height and iOS places the safe areas naturally). Transitions overlay
  // the incoming screen absolutely just for the animation, then it settles into flow.
  let current = 's-home';
  function go(id, mode){
    if (id === current) return;
    const incoming = el(id), outgoing = el(current);
    incoming.classList.add('active', 'animating');
    if (mode === 'fade'){
      incoming.style.opacity = '0';
      incoming.getBoundingClientRect();
      incoming.style.transition = 'opacity .22s ease';
      incoming.style.opacity = '1';
    } else {                       // slide (iOS push)
      incoming.style.transform = 'translateX(100%)';
      incoming.getBoundingClientRect();
      incoming.style.transition = 'transform .34s cubic-bezier(.3,.7,.3,1)';
      incoming.style.transform = 'translateX(0)';
    }
    const done = () => {
      incoming.removeEventListener('transitionend', done);
      incoming.classList.remove('animating');
      incoming.style.transition = incoming.style.transform = incoming.style.opacity = '';
      if (outgoing !== incoming){ outgoing.classList.remove('active'); outgoing.style.cssText = ''; }
      current = id;
      window.scrollTo(0, 0);
    };
    incoming.addEventListener('transitionend', done);
    setTimeout(() => { if (current !== id) done(); }, 700);  // safety
  }

  function goProfile(){ go('s-profile', 'fade'); renderStats(); }
  function goDashboard(){
    el('dashImg').src = 'screens/dash_skeleton_c.png' + ASSET_V;
    go('s-dashboard', 'slide');
    setTimeout(() => { el('dashImg').src = 'screens/dash_loaded_c.png' + ASSET_V; }, 850);
  }
  function goInsights(){
    insTab('overview', true);
    const ld = el('insLoading'); ld.style.display = 'block';
    el('loadImg').src = 'screens/ins_spinner_c.png' + ASSET_V;
    go('s-insights', 'slide');
    setTimeout(() => { el('loadImg').src = 'screens/ins_skeleton_c.png' + ASSET_V; }, 650);
    setTimeout(() => { ld.style.display = 'none'; }, 1350);
  }
  function insTab(p, silent){
    const pages = {
      overview: ['insights_overview_header2.png', 'insights_overview_full.png'],
      audience: ['insights_audience_header2.png', 'insights_audience_full.png'],
    };
    if (!pages[p]) return;
    el('himg').src = pages[p][0] + ASSET_V;
    el('cimg').src = pages[p][1] + ASSET_V;
    if (!silent) el('insContent').scrollTop = 0;
  }
</script>
</body>
</html>
