<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, minimum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#000000">
<link rel="manifest" href="manifest.json?v=14">
<link rel="apple-touch-icon" href="icon.png?v=14">
<title>Instagram</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;-webkit-user-select:none;user-select:none;-webkit-touch-callout:none;}
  html,body{background:#0b0e13;height:100%;overflow:hidden;font-family:-apple-system,"SF Pro Text",sans-serif;
            touch-action:manipulation;-webkit-text-size-adjust:100%;}
  img,video{-webkit-user-drag:none;}
  /* fill the entire device, no dependency on visualViewport (that mismatch was
     what made the emulator look right while the phone had gaps) */
  #app{position:fixed;inset:0;background:#0b0e13;}
  #safetop{display:none;}                 /* status strip is baked into the screen images now */
  #stage{position:absolute;inset:0;overflow:hidden;background:#0b0e13;}

  /* static screens: full-bleed cover so they fill edge-to-edge on every device
     (images already match the iPhone aspect, so cover crops ~0px) */
  .screen{position:absolute;inset:0;background:#0b0e13;overflow:hidden;will-change:transform;}
  .sheet{position:absolute;inset:0;}
  .sheet > img{display:block;width:100%;height:100%;object-fit:cover;object-position:center;position:relative;z-index:1;}
  video.bg{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;background:#4a2d6b;z-index:0;}
  .hot{position:absolute;background:transparent;z-index:5;}
  /* live profile stat numbers drawn from real harvested digit-images */
  #profileStats{position:absolute;inset:0;z-index:3;pointer-events:none;}
  #profileStats img{position:absolute;-webkit-user-drag:none;}

  /* insights: header on top, scrollable content fills the rest */
  #s-insights{display:flex;flex-direction:column;align-items:stretch;justify-content:flex-start;}
  #insHeader{position:relative;width:100%;flex:0 0 auto;z-index:5;}
  #insHeader img{display:block;width:100%;}
  #insContent{flex:1 1 auto;overflow-y:auto;-webkit-overflow-scrolling:touch;background:#0b0e13;}
  #insContent img{display:block;width:100%;}
  #insLoading{position:absolute;inset:0;z-index:10;background:#0b0e13;}
  #insLoading img{display:block;width:100%;}
</style>
</head>
<body>
<div id="app">
  <div id="safetop"></div>
  <div id="stage">

    <!-- HOME -->
    <div class="screen" id="s-home" style="z-index:1">
      <div class="sheet">
        <video class="bg" autoplay muted loop playsinline>
          <source src="screens/promo_placeholder.mp4?v=14" type="video/mp4">
        </video>
        <img src="screens/home_chrome_c.png?v=14">
        <div class="hot" style="left:77.8%;top:91.2%;width:22.2%;height:8.8%" onclick="goProfile()"></div>
      </div>
    </div>

    <!-- PROFILE -->
    <div class="screen" id="s-profile" style="transform:translateX(100%)">
      <div class="sheet">
        <img src="screens/profile_c.png?v=14">
        <div class="hot" style="left:5.6%;top:37.7%;width:88.9%;height:8.5%" onclick="goDashboard()"></div>
      </div>
    </div>

    <!-- DASHBOARD -->
    <div class="screen" id="s-dashboard" style="transform:translateX(100%)">
      <div class="sheet">
        <img id="dashImg" src="screens/dash_loaded_c.png?v=14">
        <div class="hot" style="left:5.6%;top:18%;width:94.4%;height:8%" onclick="goInsights()"></div>
      </div>
    </div>

    <!-- INSIGHTS -->
    <div class="screen" id="s-insights" style="transform:translateX(100%)">
      <div id="insHeader">
        <img id="himg" src="insights_overview_header2.png?v=14">
        <div class="hot" style="left:0;top:65%;width:33.3%;height:35%" onclick="insTab('overview')"></div>
        <div class="hot" style="left:66.7%;top:65%;width:33.3%;height:35%" onclick="insTab('audience')"></div>
      </div>
      <div id="insContent"><img id="cimg" src="insights_overview_full.png?v=14"></div>
      <div id="insLoading"><img id="loadImg" src="screens/ins_spinner_c.png?v=14"></div>
    </div>

  </div>
</div>
<script>
  // size the app to the REAL visible viewport (excludes Safari toolbars) so top+bottom always show
  function setH(){
    const h = (window.visualViewport && window.visualViewport.height) || window.innerHeight;
    document.documentElement.style.setProperty('--app-h', h + 'px');
  }
  setH();
  addEventListener('resize', setH);
  addEventListener('orientationchange', setH);
  if (window.visualViewport){
    visualViewport.addEventListener('resize', setH);
    visualViewport.addEventListener('scroll', setH);
  }

  // ---- live profile stat numbers (posts/followers/following) ----
  // Values come from config.js (window.STATS); digits are the real harvested
  // glyph images in glyphs/, positioned from glyphmeta.js. Edit config.js +
  // refresh to change them - no rebuild, auto-centered over the labels.
  function renderStats(){
    const meta = window.GLYPH_META, cfg = window.STATS;
    const sheet = document.querySelector('#s-profile .sheet');
    const overlay = document.getElementById('profileStats');
    if (!meta || !cfg || !sheet || !overlay) return;
    const scale = sheet.clientWidth / meta.img_w;   // uniform: aspect preserved
    if (!scale) return;
    overlay.innerHTML = '';
    const cap = meta.capPx * scale;
    const baseline = meta.baselinePx * scale;
    const gap = meta.gapPx * scale;
    const capTop = baseline - cap;
    for (const key in meta.stats){
      const val = String((cfg[key] != null ? cfg[key] : ''));
      const items = [];
      let totalW = 0;
      for (const ch of val){
        const g = meta.glyphs[ch];
        if (!g) continue;
        const w = g.w * scale;
        items.push({ g, w, h: g.h * scale, top: g.top * scale });
        totalW += w;
      }
      if (items.length) totalW += gap * (items.length - 1);
      let x = meta.stats[key].cx * scale - totalW / 2;   // center on label
      for (const it of items){
        const im = document.createElement('img');
        im.src = 'glyphs/' + it.g.file + (window.ASSET_V || '');
        im.style.left = x + 'px';
        im.style.top = (capTop + it.top) + 'px';
        im.style.width = it.w + 'px';
        im.style.height = it.h + 'px';
        overlay.appendChild(im);
        x += it.w + gap;
      }
    }
  }
  window.renderStats = renderStats;
  addEventListener('load', renderStats);
  addEventListener('resize', renderStats);
  if (window.visualViewport) visualViewport.addEventListener('resize', renderStats);
  if (document.readyState !== 'loading') renderStats();

  // hard-disable zoom (iOS ignores user-scalable in some versions)
  document.addEventListener('gesturestart', e => e.preventDefault());
  document.addEventListener('gesturechange', e => e.preventDefault());
  let lastTouch = 0;
  document.addEventListener('touchend', e => {
    const now = Date.now();
    if (now - lastTouch <= 300) e.preventDefault();
    lastTouch = now;
  }, { passive: false });

  const ASSET_V = '?v=14';   // bump when any screen image changes (cache-bust mobile)
  const el = id => document.getElementById(id);
  let zTop = 2;
  const raise = id => { el(id).style.zIndex = ++zTop; };

  function push(id){
    const s = el(id); raise(id);
    s.style.transition = 'none'; s.style.transform = 'translateX(100%)';
    s.getBoundingClientRect();
    s.style.transition = 'transform .34s cubic-bezier(.3,.7,.3,1)';
    s.style.transform = 'translateX(0)';
  }
  function goProfile(){
    const s = el('s-profile'); raise('s-profile');
    s.style.transition='none'; s.style.transform='translateX(0)'; s.style.opacity='0';
    s.getBoundingClientRect();
    s.style.transition='opacity .22s ease'; s.style.opacity='1';
    renderStats();
  }
  function goDashboard(){
    el('dashImg').src = 'screens/dash_skeleton_c.png' + ASSET_V;
    push('s-dashboard');
    setTimeout(() => { el('dashImg').src = 'screens/dash_loaded_c.png' + ASSET_V; }, 850);
  }
  function goInsights(){
    insTab('overview', true);
    el('insContent').scrollTop = 0;
    const ld = el('insLoading'); ld.style.display = 'block';
    el('loadImg').src = 'screens/ins_spinner_c.png' + ASSET_V;
    push('s-insights');
    setTimeout(() => { el('loadImg').src = 'screens/ins_skeleton_c.png' + ASSET_V; }, 650);
    setTimeout(() => { ld.style.display = 'none'; }, 1350);
  }
  function insTab(p, silent){
    const pages = {
      overview: ['insights_overview_header2.png', 'insights_overview_full.png'],
      audience: ['insights_audience_header2.png', 'insights_audience_full.png'],
    };
    if (!pages[p]) return;
    el('himg').src = pages[p][0] + ASSET_V;
    el('cimg').src = pages[p][1] + ASSET_V;
    if (!silent) el('insContent').scrollTop = 0;
  }
</script>
</body>
</html>
