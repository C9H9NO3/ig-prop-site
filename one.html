<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, minimum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#000000">
<link rel="manifest" href="manifest_one.json?v=25">
<link rel="apple-touch-icon" href="icon.png?v=25">
<title>Instagram</title>
<script>if('serviceWorker' in navigator){navigator.serviceWorker.register('sw.js',{updateViaCache:'none'}).then(r=>r.update());}</script>
<style>
  *{margin:0;padding:0;box-sizing:border-box;-webkit-user-select:none;user-select:none;-webkit-touch-callout:none;
    scrollbar-width:none;-ms-overflow-style:none;}
  ::-webkit-scrollbar{display:none;width:0;height:0;}   /* IG never shows scrollbars */
  /* normal-flow scrolling document, same proven pattern as the main app */
  html{background:#0c1014;-webkit-text-size-adjust:100%;}
  body{background:#0c1014;min-height:100dvh;overflow-x:hidden;
       font-family:-apple-system,"SF Pro Text",sans-serif;touch-action:manipulation;}
  img{-webkit-user-drag:none;display:block;width:100%;height:auto;}
  /* header stays pinned while the content scrolls under it, like the real app */
  #hdr{position:sticky;top:0;z-index:10;background:#0c1014;}
  /* dark pad below the content so the very bottom scrolls clear of the home indicator */
  #pad{height:env(safe-area-inset-bottom,0px);background:#0c1014;}
</style>
</head>
<body>
  <div id="hdr"><img src="screens/reel_header.png?v=25" alt=""></div>
  <img src="screens/reel_full.png?v=25" alt="">
  <div id="pad"></div>
<script>
  // hard-disable zoom (iOS ignores user-scalable in some versions)
  document.addEventListener('gesturestart', e => e.preventDefault());
  document.addEventListener('gesturechange', e => e.preventDefault());
  let lastTouch = 0;
  document.addEventListener('touchend', e => {
    const now = Date.now();
    if (now - lastTouch <= 300) e.preventDefault();
    lastTouch = now;
  }, { passive: false });
</script>
</body>
</html>
